<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【未來許願機】夢想狂想文字雲 3.1</title>
    <style>
        /* 載入您上傳的特製字體 */
        @font-face {
            font-family: 'CustomFont';
            src: url('StarPandaKidsBeta2.1.ttf') format('truetype'); /* ⚠️ 請確保與您的ttf檔名乙致 */
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 文字雲外殼：畫布底色為純白，圓角化並加上淡紫色立體陰影 */
        .wordcloud-wrapper {
            position: relative;
            width: 100%;
            max-width: 850px;
            height: 480px;
            background: #FFFFFF; 
            border-radius: 20px; 
            box-shadow: 0 12px 40px rgba(169, 156, 199, 0.25);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="wordcloud-wrapper">
        <canvas id="cloudCanvas"></canvas>
    </div>

    <script>
        // ===================================================================
        // ✨ 策展人專區一：手動精選回答（置大字體，維持 10-15 個最完美）
        // ===================================================================
        const bigWords = [
            "希望在成功湖畔釣到大魚", "微積分一定要歐趴！", "每天都有睡飽8小時", 
            "交到男女朋友", "Logic Pro神曲產出", "希望能跟校長合照", 
            "被新竹的風吹到免修體育", "腳踏車永遠不被偷", "順利兩年準時畢業", 
            "碩論一次就過關", "梅竹賽清大總錦標", "一定要拿到書卷獎"
        ];

        // ===================================================================
        // ✨ 策展人專區二：背景填充小字（打散到全網頁各處，營造向外滿天星斗感）
        // ===================================================================
        const smallWordsPool = [
            "歐趴", "AllPass", "實習", "竹科", "台積電", "聯發科", "成功湖", 
            "夜唱", "總圖", "宵夜街", "水木", "清茂", "大吃市", "巨城", "九降風", 
            "畢旅", "日本", "下課", "睡覺", "學分", "通通選到", "加簽成功", "看書", 
            "梅竹", "熱血", "青春", "100分", "大吉", "狂想曲", "未來", "夢想", 
            "不迷惘", "加油", "抽中宿舍", "冷氣卡滿格", "WiFi超快", "早八不遲到",
            "歐趴糖", "圖書館", "放假", "賺大錢", "不掉傘", "脫單", "安全AllPass"
        ];

        // 🎨 莫蘭迪繽紛色系矩陣（內含每種基底色的 5 種深淺明暗變化）
        const colorPalette = [
            "#6A51A3", "#8067B7", "#9A7EC9", "#B39DDB", "#D1C4E9", // 粉紫
            "#1F6596", "#3A82B8", "#60A0D4", "#90CAF9", "#C1E2FF", // 粉藍
            "#D47A2A", "#E69549", "#F5B070", "#FFCC80", "#FFE0B2", // 柔橘
            "#2E6930", "#438A47", "#66BB6A", "#A5D6A7", "#C8E6C9", // 嫩綠
            "#B84A6E", "#D1648A", "#E682A5", "#F48FB1", "#F8BBD0"  // 柔粉
        ];

        const canvas = document.getElementById('cloudCanvas');
        const ctx = canvas.getContext('2d');
        let words = [];
        let activeIndex = -1;
        let highlightProgress = 0;

        function initWordCloud() {
            resizeCanvas();
            generateLayout();
            drawLoop();
            
            // 螢火蟲聚光燈計時器
            setInterval(triggerSpotlight, 3800);
            setTimeout(triggerSpotlight, 1200); 
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        // 全新「全面開散演算法」：打破聚集，強制均勻撒在整個大畫布上
        function generateLayout() {
            words = [];
            const W = canvas.width;
            const H = canvas.height;

            // 1. 散落大字（配置在中間大核心區，但維持極高防撞距離，防止字體靠太近）
            bigWords.forEach((text, idx) => {
                const size = Math.floor(Math.min(W, H) * 0.052) + Math.floor(Math.random() * 5);
                addWordRandomScatter(text, size, true, idx, W * 0.2, W * 0.8, H * 0.2, H * 0.8, 45);
            });

            // 2. 徹底向外大散落小字（散落到整個畫布的 100% 邊緣，增加全畫面的豐富精緻度）
            const maxSmallWords = 65; // 調高到 65 個小字，塞滿整個大白底視窗
            let smallIdx = 0;
            let attempts = 0;
            
            while (words.length < (bigWords.length + maxSmallWords) && attempts < 4000) {
                attempts++;
                const text = smallWordsPool[smallIdx % smallWordsPool.length];
                const size = Math.floor(Math.min(W, H) * 0.024) + Math.floor(Math.random() * 4);
                
                // 允許小字撒到最外圍邊界（畫布的 5% ~ 95% 範圍，全面向外開散）
                if (addWordRandomScatter(text, size, false, words.length, W * 0.05, W * 0.95, H * 0.05, H * 0.95, 12)) {
                    smallIdx++;
                }
            }
        }

        function addWordRandomScatter(text, size, isHighlight, colorSeed, minX, maxX, minY, maxY, safetyBuffer) {
            ctx.font = `bold ${size}px 'CustomFont', sans-serif`;
            const metrics = ctx.measureText(text);
            const w = metrics.width + 14;
            const h = size + 8;

            let localAttempts = 0;
            while (localAttempts < 500) {
                localAttempts++;
                // 在限定的擴散區間內隨機投點
                const x = Math.random() * (maxX - minX) + minX;
                const y = Math.random() * (maxY - minY) + minY;

                // 超出畫布邊界的安全過濾
                if (x - w/2 < 15 || x + w/2 > canvas.width - 15 || y - h/2 < 15 || y + h/2 > canvas.height - 15) {
                    continue;
                }

                // 嚴格碰撞檢查，加上傳入的 safetyBuffer 安全防撞距離
                let isOverlapping = false;
                for (let i = 0; i < words.length; i++) {
                    const other = words[i];
                    if (Math.abs(x - other.x) < (w + other.w)/2 + safetyBuffer && Math.abs(y - other.y) < (h + other.h)/2 + safetyBuffer) {
                        isOverlapping = true;
                        break;
                    }
                }

                if (!isOverlapping) {
                    const color = colorPalette[colorSeed % colorPalette.length];
                    words.push({
                        text: text, baseSize: size, currentSize: size,
                        x: x, y: y, w: w, h: h,
                        color: color, isHighlight: isHighlight
                    });
                    return true;
                }
            }
            return false;
        }

        function drawLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 第一層：普通文字
            words.forEach((word, idx) => {
                if (idx === activeIndex) return; 
                ctx.save();
                ctx.translate(word.x, word.y);
                word.currentSize += (word.baseSize - word.currentSize) * 0.1;
                ctx.fillStyle = word.color;
                ctx.font = `bold ${word.currentSize}px 'CustomFont', 'Noto Sans TC', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(word.text, 0, 0);
                ctx.restore();
            });

            // 第二層：永遠絕對置頂的螢火蟲聚光燈效果（灰底反白）
            if (activeIndex !== -1) {
                const word = words[activeIndex];
                ctx.save();
                
                const targetSize = word.baseSize * 1.35;
                word.currentSize += (targetSize - word.currentSize) * 0.1;
                
                const boxW = word.w * 1.38;
                const boxH = word.h * 1.38;
                
                let renderX = word.x;
                let renderY = word.y;
                
                // 四周絕對防裁切安全極限值
                if (renderX - boxW/2 < 20) renderX = boxW/2 + 20;
                if (renderX + boxW/2 > canvas.width - 20) renderX = canvas.width - boxW/2 - 20;
                if (renderY - boxH/2 < 20) renderY = boxH/2 + 20;
                if (renderY + boxH/2 > canvas.height - 20) renderY = canvas.height - boxH/2 - 20;

                ctx.translate(renderX, renderY);

                // 柔和的深中灰半透明底色框
                ctx.beginPath();
                ctx.fillStyle = `rgba(105, 105, 105, ${0.75 * highlightProgress})`; 
                ctx.roundRect(-boxW/2, -boxH/2, boxW, boxH, 10);
                ctx.fill();

                // 聚光燈純白反白文字
                ctx.fillStyle = `rgba(255, 255, 255, ${highlightProgress})`;
                ctx.font = `bold ${word.currentSize}px 'CustomFont', 'Noto Sans TC', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(word.text, 0, 0);
                ctx.restore();
            }

            requestAnimationFrame(drawLoop);
        }

        function triggerSpotlight() {
            const highlightPool = words.reduce((acc, w, i) => w.isHighlight ? [...acc, i] : acc, []);
            if (highlightPool.length === 0) return;

            let nextIdx;
            do {
                nextIdx = highlightPool[Math.floor(Math.random() * highlightPool.length)];
            } while (nextIdx === activeIndex && highlightPool.length > 1);

            activeIndex = nextIdx;
            highlightProgress = 0;
            
            let fadeIn = setInterval(() => {
                highlightProgress += 0.06;
                if (highlightProgress >= 1) {
                    highlightProgress = 1;
                    clearInterval(fadeIn);
                }
            }, 25);

            setTimeout(() => {
                let fadeOut = setInterval(() => {
                    highlightProgress -= 0.06;
                    if (highlightProgress <= 0) {
                        highlightProgress = 0;
                        activeIndex = -1; 
                        clearInterval(fadeOut);
                    }
                }, 25);
            }, 2300);
        }

        window.addEventListener('load', initWordCloud);
    </script>
</body>
</html>
