<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【未來許願機】夢想狂想文字雲 4.0</title>
    <style>
        /* 載入您上傳的特製字體 */
        @font-face {
            font-family: 'CustomFont';
            src: url('your-font.ttf') format('truetype'); /* ⚠️ 請確保與您的ttf檔名一致 */
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 文字雲外殼：畫布底色為純白，圓角化並加上淡紫色立體陰影 */
        .wordcloud-wrapper {
            position: relative;
            width: 100%;
            max-width: 850px;
            height: 480px;
            background: #FFFFFF; 
            border-radius: 20px; 
            box-shadow: 0 12px 40px rgba(169, 156, 199, 0.25);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="wordcloud-wrapper">
        <canvas id="cloudCanvas"></canvas>
    </div>

    <script>
        // ===================================================================
        // ✨ 策展人專區一：手動精選回答（固定最大的12個，尺寸將會自動呈現階梯式不相同）
        // ===================================================================
        const bigWords = [
            "希望在成功湖畔釣到大魚", "微積分一定要歐趴！", "每天都有睡飽8小時", 
            "交到男女朋友", "Logic Pro神曲產出", "希望能跟校長合照", 
            "被新竹的風吹到免修體育", "腳踏車永遠不被偷", "順利兩年準時畢業", 
            "碩論一次就過關", "梅竹賽清大總錦標", "一定要拿到書卷獎"
        ];

        // ===================================================================
        // ✨ 策展人專區二：背景填充小字
        // ===================================================================
        const smallWordsPool = [
            "歐趴", "AllPass", "實習", "竹科", "台積電", "聯發科", "成功湖", 
            "夜唱", "總圖", "宵夜街", "水木", "清茂", "大吃市", "巨城", "九降風", 
            "畢旅", "日本", "下課", "睡覺", "學分", "通通選到", "加簽成功", "看書", 
            "梅竹", "熱血", "青春", "100分", "大吉", "狂想曲", "未來", "夢想", 
            "不迷惘", "加油", "抽中宿舍", "冷氣卡滿格", "WiFi超快", "早八不遲到",
            "歐趴糖", "圖書館", "放假", "賺大錢", "不掉傘", "脫單", "安全AllPass"
        ];

        // 🎨 莫蘭迪繽紛色系矩陣（內含每種基底色的 5 種深淺明暗變化）
        const colorPalette = [
            "#6A51A3", "#8067B7", "#9A7EC9", "#B39DDB", "#D1C4E9", // 粉紫
            "#1F6596", "#3A82B8", "#60A0D4", "#90CAF9", "#C1E2FF", // 粉藍
            "#D47A2A", "#E69549", "#F5B070", "#FFCC80", "#FFE0B2", // 柔橘
            "#2E6930", "#438A47", "#66BB6A", "#A5D6A7", "#C8E6C9", // 嫩綠
            "#B84A6E", "#D1648A", "#E682A5", "#F48FB1", "#F8BBD0"  // 柔粉
        ];

        const canvas = document.getElementById('cloudCanvas');
        const ctx = canvas.getContext('2d');
        let words = [];
        let activeIndex = -1;
        let highlightProgress = 0;
        let devicePixelRatio = window.devicePixelRatio || 1;

        function initWordCloud() {
            resizeCanvas();
            generateLayout();
            drawLoop();
            
            // 螢火蟲聚光燈計時器
            setInterval(triggerSpotlight, 3800);
            setTimeout(triggerSpotlight, 1200); 
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            devicePixelRatio = window.devicePixelRatio || 1;
            
            // 🔮 核心優化：強制提高 Canvas 的畫布物理尺寸，達成視網膜級高清晰度
            canvas.width = rect.width * devicePixelRatio;
            canvas.height = rect.height * devicePixelRatio;
            
            // 用 CSS 控制顯示尺寸，將字體像素壓實
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
        }

        function generateLayout() {
            words = [];
            const W = canvas.width / devicePixelRatio;
            const H = canvas.height / devicePixelRatio;

            // 1. 部署 12 個大字（自動計算階梯式尺寸，保證每一個大小都不相同）
            bigWords.forEach((text, idx) => {
                // 階梯公式：從最大的 48px 一路平滑降到 32px，彼此不重複
                const size = 48 - (idx * 1.45);
                addWordRandomScatter(text, size, true, idx, W * 0.18, W * 0.82, H * 0.18, H * 0.82, 45);
            });

            // 2. 鋪設擴散小字（連續型隨機尺寸，顏色、大小完全不相同）
            const maxSmallWords = 60;
            let smallIdx = 0;
            let attempts = 0;
            
            while (words.length < (bigWords.length + maxSmallWords) && attempts < 4500) {
                attempts++;
                const text = smallWordsPool[attempts % smallWordsPool.length];
                
                // 小字階梯分配：利用連續餘數與隨機，確保每個大小都不相同 (範圍落在 14px ~ 25px 之間)
                const size = 14 + (attempts % 12) + (Math.random() * 0.8);
                
                // 全面散開到外圍（5% ~ 95% 範圍）
                if (addWordRandomScatter(text, size, false, attempts, W * 0.05, W * 0.95, H * 0.05, H * 0.95, 12)) {
                    smallIdx++;
                }
            }
        }

        function addWordRandomScatter(text, size, isHighlight, colorSeed, minX, maxX, minY, maxY, safetyBuffer) {
            ctx.save();
            ctx.font = `bold ${size}px 'CustomFont', sans-serif`;
            const metrics = ctx.measureText(text);
            ctx.restore();
            
            // 考慮到旋轉後的安全碰撞矩形外殼，適度放大寬高緩衝
            const w = metrics.width + 16;
            const h = size + 10;

            const W = canvas.width / devicePixelRatio;
            const H = canvas.height / devicePixelRatio;
            
            let localAttempts = 0;
            while (localAttempts < 600) {
                localAttempts++;
                const x = Math.random() * (maxX - minX) + minX;
                const y = Math.random() * (maxY - minY) + minY;

                if (x - w/2 < 15 || x + w/2 > W - 15 || y - h/2 < 15 || y + h/2 > H - 15) {
                    continue;
                }

                let isOverlapping = false;
                for (let i = 0; i < words.length; i++) {
                    const other = words[i];
                    if (Math.abs(x - other.x) < (w + other.w)/2 + safetyBuffer && Math.abs(y - other.y) < (h + other.h)/2 + safetyBuffer) {
                        isOverlapping = true;
                        break;
                    }
                }

                if (!isOverlapping) {
                    // 隨機生成微幅旋轉弧度：正負 30 度以內 (約為 -0.52 到 +0.52 弧度)
                    // 小字可以旋轉，大字為求閱讀體驗保持更端正（正負 10 度內）
                    const maxAngle = isHighlight ? (10 * Math.PI / 180) : (30 * Math.PI / 180);
                    const rotateAngle = (Math.random() * 2 - 1) * maxAngle;

                    // 確保色彩矩陣中的索引打散，大小顏色皆不相同
                    const colorIndex = (colorSeed * 7 + localAttempts) % colorPalette.length;
                    const color = colorPalette[colorIndex];
                    
                    words.push({
                        text: text, baseSize: size, currentSize: size,
                        x: x, y: y, w: w, h: h,
                        color: color, isHighlight: isHighlight,
                        angle: rotateAngle
                    });
                    return true;
                }
            }
            return false;
        }

        function drawLoop() {
            // 清除畫布，並帶入 Retina 縮放比例
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(devicePixelRatio, devicePixelRatio);

            // 第一層：繪製所有普通文字
            words.forEach((word, idx) => {
                if (idx === activeIndex) return; 
                ctx.save();
                ctx.translate(word.x, word.y);
                ctx.rotate(word.angle); // 套用隨機不規則微幅旋轉

                word.currentSize += (word.baseSize - word.currentSize) * 0.1;
                ctx.fillStyle = word.color;
                ctx.font = `bold ${word.currentSize}px 'CustomFont', 'Noto Sans TC', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(word.text, 0, 0);
                ctx.restore();
            });

            // 第二層：永遠絕對置頂的螢火蟲聚光燈效果
            if (activeIndex !== -1) {
                const word = words[activeIndex];
                ctx.save();
                
                const targetSize = word.baseSize * 1.35;
                word.currentSize += (targetSize - word.currentSize) * 0.1;
                
                const boxW = word.w * 1.4;
                const boxH = word.h * 1.4;
                
                let renderX = word.x;
                let renderY = word.y;
                
                const W = canvas.width / devicePixelRatio;
                const H = canvas.height / devicePixelRatio;

                // 絕對防裁切限制
                if (renderX - boxW/2 < 20) renderX = boxW/2 + 20;
                if (renderX + boxW/2 > W - 20) renderX = W - boxW/2 - 20;
                if (renderY - boxH/2 < 20) renderY = boxH/2 + 20;
                if (renderY + boxH/2 > H - 20) renderH = H - boxH/2 - 20;

                ctx.translate(renderX, renderY);
                ctx.rotate(word.angle); // 置頂聚焦字同樣保持優雅的旋轉角度

                // 柔和的深中灰半透明底色框
                ctx.beginPath();
                ctx.fillStyle = `rgba(105, 105, 105, ${0.75 * highlightProgress})`; 
                ctx.roundRect(-boxW/2, -boxH/2, boxW, boxH, 10);
                ctx.fill();

                // 聚光燈純白反白文字
                ctx.fillStyle = `rgba(255, 255, 255, ${highlightProgress})`;
                ctx.font = `bold ${word.currentSize}px 'CustomFont', 'Noto Sans TC', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(word.text, 0, 0);
                ctx.restore();
            }

            ctx.restore();
            requestAnimationFrame(drawLoop);
        }

        function triggerSpotlight() {
            const highlightPool = words.reduce((acc, w, i) => w.isHighlight ? [...acc, i] : acc, []);
            if (highlightPool.length === 0) return;

            let nextIdx;
            do {
                nextIdx = highlightPool[Math.floor(Math.random() * highlightPool.length)];
            } while (nextIdx === activeIndex && highlightPool.length > 1);

            activeIndex = nextIdx;
            highlightProgress = 0;
            
            let fadeIn = setInterval(() => {
                highlightProgress += 0.06;
                if (highlightProgress >= 1) {
                    highlightProgress = 1;
                    clearInterval(fadeIn);
                }
            }, 25);

            setTimeout(() => {
                let fadeOut = setInterval(() => {
                    highlightProgress -= 0.06;
                    if (highlightProgress <= 0) {
                        highlightProgress = 0;
                        activeIndex = -1; 
                        clearInterval(fadeOut);
                    }
                }, 25);
            }, 2300);
        }

        window.addEventListener('load', initWordCloud);
        // 當瀏覽器視窗縮放時，自動重新計算解析度，保持極致清晰
        window.addEventListener('resize', () => {
            resizeCanvas();
            generateLayout();
        });
    </script>
</body>
</html>
