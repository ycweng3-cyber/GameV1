<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【未來許願機】夢想狂想文字雲 2.0</title>
    <style>
        /* 載入您上傳的特製字體 */
        @font-face {
            font-family: 'CustomFont';
            src: url('StarPandaKidsBeta2.1.ttf') format('truetype'); /* ⚠️ 請確保檔名正確 */
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 文字雲外殼：畫布底色為純白，圓角化並加上淡紫色立體陰影 */
        .wordcloud-wrapper {
            position: relative;
            width: 100%;
            max-width: 850px;
            height: 480px;
            background: #FFFFFF; 
            border-radius: 20px; 
            box-shadow: 0 12px 40px rgba(169, 156, 199, 0.25);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="wordcloud-wrapper">
        <canvas id="cloudCanvas"></canvas>
    </div>

    <script>
        // ===================================================================
        // ✨ 策展人專區一：手動精選回答（預設大字體，維持 10-15 個最佳）
        // ===================================================================
        const bigWords = [
            "希望在成功湖畔釣到大魚", "微積分一定要歐趴！", "每天都有睡飽8小時", 
            "交到男女朋友", "Logic Pro神曲產出", "希望能跟校長合照", 
            "被新竹的風吹到免修體育", "腳踏車永遠不被偷", "順利兩年準時畢業", 
            "碩論一次就過關", "梅竹賽清大總錦標", "一定要拿到書卷獎"
        ];

        // ===================================================================
        // ✨ 策展人專區二：背景填充小字（用來精準勾勒出 Logo 的書本與階梯線條）
        // ===================================================================
        const smallWordsPool = [
            "歐趴", "AllPass", "實習", "竹科", "台積電", "聯發科", "成功湖", 
            "夜唱", "總圖", "宵夜街", "水木", "清茂", "大吃市", "巨城", "九降風", 
            "畢旅", "日本", "下課", "睡覺", "學分", "通通選到", "加簽成功", "看書", 
            "梅竹", "熱血", "青春", "100分", "大吉", "狂想曲", "未來", "夢想", 
            "不迷惘", "加油", "抽中宿舍", "冷氣卡滿格", "WiFi超快", "早八不遲到"
        ];

        // 🎨 豐富且帶有莫蘭迪灰調的繽紛色系（完美避開純灰色）
        const colorPalette = [
            "#B39DDB", "#90CAF9", "#FFCC80", "#A5D6A7", "#F48FB1", 
            "#80CBC4", "#CE93D8", "#B0BEC5", "#FFAB91", "#C5E1A5"
        ];

        const canvas = document.getElementById('cloudCanvas');
        const ctx = canvas.getContext('2d');
        let words = [];
        let activeIndex = -1;
        let highlightProgress = 0;
        let logoMaskCanvas = document.createElement('canvas');
        let logoMaskCtx = logoMaskCanvas.getContext('2d');

        // 載入清大圖書館 Logo 作為遮罩基準
        const logoImg = new Image();
        logoImg.src = 'logo.png'; 

        logoImg.onload = () => {
            initWordCloud();
        };

        function initWordCloud() {
            resizeCanvas();
            generateLayout();
            drawLoop();
            
            // 螢火蟲霓虹燈計時器（每 3.8 秒閃爍一次）
            setInterval(triggerSpotlight, 3800);
            setTimeout(triggerSpotlight, 1200); 
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            
            // 同步縮放後台的 Logo 遮罩畫布
            logoMaskCanvas.width = canvas.width;
            logoMaskCanvas.height = canvas.height;
            
            // 將 Logo 縮放並繪製到隱藏畫布中，並在四周留白 15% 防止文字貼邊
            const padding = canvas.width * 0.15;
            const targetW = canvas.width - (padding * 2);
            const targetH = canvas.height - (padding * 2);
            
            // 保持比例居中
            const ratio = Math.min(targetW / logoImg.width, targetH / logoImg.height);
            const x = (canvas.width - logoImg.width * ratio) / 2;
            const y = (canvas.height - logoImg.height * ratio) / 2;
            
            logoMaskCtx.clearRect(0, 0, canvas.width, canvas.height);
            logoMaskCtx.drawImage(logoImg, x, y, logoImg.width * ratio, logoImg.height * ratio);
        }

        // 檢查該座標點在 Logo 上是否有顏色（是否可以放字）
        function isInsideLogo(x, y) {
            try {
                const imgData = logoMaskCtx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
                return imgData[3] > 30; // 透明度大於 30 視為有效區
            } catch (e) {
                return true; 
            }
        }

        function generateLayout() {
            words = [];
            const W = canvas.width;
            const H = canvas.height;

            // 1. 先塞入需要被凸顯的手動精選大字
            bigWords.forEach((text, idx) => {
                const size = Math.floor(Math.min(W, H) * 0.055) + Math.floor(Math.random() * 8); // 動態大字體
                addWordItem(text, size, true, idx);
            });

            // 2. 密集塞入背景填充小字，直到嘗試上限，徹底把 Logo 書本和階梯形狀「逼」出來
            let attempts = 0;
            const maxSmallWords = 65; // 背景小字總數
            let smallIdx = 0;
            
            while (words.length < (bigWords.length + maxSmallWords) && attempts < 2500) {
                attempts++;
                const text = smallWordsPool[smallIdx % smallWordsPool.length];
                const size = Math.floor(Math.min(W, H) * 0.025) + Math.floor(Math.random() * 5); // 輕量小字體
                
                if (addWordItem(text, size, false, words.length)) {
                    smallIdx++;
                }
            }
        }

        function addWordItem(text, size, isHighlight, colorSeed) {
            ctx.font = `bold ${size}px 'CustomFont', sans-serif`;
            const metrics = ctx.measureText(text);
            const paddingX = 14;
            const paddingY = 8;
            const w = metrics.width + paddingX;
            const h = size + paddingY;

            const W = canvas.width;
            const H = canvas.height;
            
            let x, y, isOverlapping;
            let localAttempts = 0;

            while (localAttempts < 400) {
                localAttempts++;
                // 在畫布內隨機投點
                x = Math.random() * (W - w - 40) + w/2 + 20;
                y = Math.random() * (H - h - 40) + h/2 + 20;

                // 核心關鍵：檢查字體的中心與四角是否落在 Logo 的實色範圍內
                if (!isInsideLogo(x, y) || !isInsideLogo(x - w/2, y - h/2) || !isInsideLogo(x + w/2, y + h/2)) {
                    continue; 
                }

                // 檢查是否與現有文字重疊
                isOverlapping = false;
                for (let i = 0; i < words.length; i++) {
                    const other = words[i];
                    // 增加 4 像素的防撞緩衝安全距離
                    if (Math.abs(x - other.x) < (w + other.w)/2 + 4 && Math.abs(y - other.y) < (h + other.h)/2 + 4) {
                        isOverlapping = true;
                        break;
                    }
                }

                if (!isOverlapping) {
                    // 挑選顏色，並確保前後兩格顏色不相同
                    let color = colorPalette[colorSeed % colorPalette.length];
                    
                    words.push({
                        text: text,
                        baseSize: size,
                        currentSize: size,
                        x: x, y: y, w: w, h: h,
                        color: color,
                        isHighlight: isHighlight
                    });
                    return true;
                }
            }
            return false;
        }

        function drawLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 分成兩次繪製：第一次畫普通字，第二次畫置頂的高亮灰底字，確保絕對不被遮擋
            words.forEach((word, idx) => {
                if (idx === activeIndex) return; // 留給後面置頂繪製
                ctx.save();
                ctx.translate(word.x, word.y);
                word.currentSize += (word.baseSize - word.currentSize) * 0.1;
                ctx.fillStyle = word.color;
                ctx.font = `bold ${word.currentSize}px 'CustomFont', 'Noto Sans TC', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(word.text, 0, 0);
                ctx.restore();
            });

            // 👑 置頂繪製：螢火蟲聚焦灰底反白效果
            if (activeIndex !== -1) {
                const word = words[activeIndex];
                ctx.save();
                
                // 為了防裁切，動態計算邊界限制，如果擴大後的灰框超出邊界，自動往內彈回
                const targetSize = word.baseSize * 1.35;
                word.currentSize += (targetSize - word.currentSize) * 0.1;
                
                const boxW = word.w * 1.38;
                const boxH = word.h * 1.38;
                
                let renderX = word.x;
                let renderY = word.y;
                
                // 左右防邊緣裁切安全機制
                if (renderX - boxW/2 < 15) renderX = boxW/2 + 15;
                if (renderX + boxW/2 > canvas.width - 15) renderX = canvas.width - boxW/2 - 15;
                // 上下防邊緣裁切安全機制
                if (renderY - boxH/2 < 15) renderY = boxH/2 + 15;
                if (renderY + boxH/2 > canvas.height - 15) renderY = canvas.height - boxH/2 - 15;

                ctx.translate(renderX, renderY);

                // 繪製半透明灰底
                ctx.beginPath();
                ctx.fillStyle = `rgba(100, 100, 100, ${0.72 * highlightProgress})`; 
                ctx.roundRect(-boxW/2, -boxH/2, boxW, boxH, 10);
                ctx.fill();

                // 文字反白呈現（純白微光）
                ctx.fillStyle = `rgba(255, 255, 255, ${highlightProgress})`;
                ctx.font = `bold ${word.currentSize}px 'CustomFont', 'Noto Sans TC', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(word.text, 0, 0);
                ctx.restore();
            }

            requestAnimationFrame(drawLoop);
        }

        // 啟動螢火蟲聚光燈
        function triggerSpotlight() {
            const highlightPool = words.reduce((acc, w, i) => w.isHighlight ? [...acc, i] : acc, []);
            if (highlightPool.length === 0) return;

            let nextIdx;
            do {
                nextIdx = highlightPool[Math.floor(Math.random() * highlightPool.length)];
            } while (nextIdx === activeIndex && highlightPool.length > 1);

            activeIndex = nextIdx;
            highlightProgress = 0;
            
            // 溫和淡入
            let fadeIn = setInterval(() => {
                highlightProgress += 0.06;
                if (highlightProgress >= 1) {
                    highlightProgress = 1;
                    clearInterval(fadeIn);
                }
            }, 25);

            // 持續 2.3 秒（打地鼠節奏），隨後溫和淡出
            setTimeout(() => {
                let fadeOut = setInterval(() => {
                    highlightProgress -= 0.06;
                    if (highlightProgress <= 0) {
                        highlightProgress = 0;
                        activeIndex = -1; 
                        clearInterval(fadeOut);
                    }
                }, 25);
            }, 2300);
        }
    </script>
</body>
</html>
