<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【未來許願機】夢想狂想文字雲 6.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 文字雲外殼：畫布底色為純白，圓角化並加上淡紫色立體陰影 */
        .wordcloud-wrapper {
            position: relative;
            width: 100%;
            max-width: 850px;
            height: 480px;
            background: #FFFFFF; 
            border-radius: 20px; 
            box-shadow: 0 12px 40px rgba(169, 156, 199, 0.25);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="wordcloud-wrapper">
        <canvas id="cloudCanvas"></canvas>
    </div>

    <script>
        // ===================================================================
        // ✨ 策展人專區一：手動精選回答（固定最大的12個，長度超過8字會自動幫您分2行！）
        // ===================================================================
        const bigWords = [
            "希望在成功湖畔釣到大魚", "微積分一定要歐趴！", "每天都有睡飽8小時", 
            "交到男女朋友", "Logic Pro神曲產出", "希望能跟校長合照", 
            "被新竹的風吹到免修體育", "腳踏車永遠不被偷", "順利兩年準時畢業", 
            "碩論一次就過關", "梅竹賽清大總錦標", "一定要拿到書卷獎"
        ];

        // ===================================================================
        // ✨ 策展人專區二：背景填充小字
        // ===================================================================
        const smallWordsPool = [
            "歐趴", "AllPass", "實習", "竹科", "台積電", "聯發科", "成功湖", 
            "夜唱", "總圖", "宵夜街", "水木", "清茂", "大吃市", "巨城", "九降風", 
            "畢旅", "日本", "下課", "睡覺", "學分", "通通選到", "加簽成功", "看書", 
            "梅竹", "熱血", "青春", "100分", "大吉", "狂想曲", "未來", "夢想", 
            "不迷惘", "加油", "抽中宿舍", "冷氣卡滿格", "WiFi超快", "早八不遲到",
            "歐趴糖", "圖書館", "放假", "賺大錢", "不掉傘", "脫單", "安全AllPass"
        ];

        // 🎨 莫蘭迪繽紛色系矩陣（內含每種基底色的 5 種深淺明暗變化）
        const colorPalette = [
            "#6A51A3", "#8067B7", "#9A7EC9", "#B39DDB", "#D1C4E9", // 粉紫
            "#1F6596", "#3A82B8", "#60A0D4", "#90CAF9", "#C1E2FF", // 粉藍
            "#D47A2A", "#E69549", "#F5B070", "#FFCC80", "#FFE0B2", // 柔橘
            "#2E6930", "#438A47", "#66BB6A", "#A5D6A7", "#C8E6C9", // 嫩綠
            "#B84A6E", "#D1648A", "#E682A5", "#F48FB1", "#F8BBD0"  // 柔粉
        ];

        const canvas = document.getElementById('cloudCanvas');
        const ctx = canvas.getContext('2d');
        let words = [];
        let activeIndex = -1;
        let highlightProgress = 0;
        let dpr = window.devicePixelRatio || 1;
        let scaleFactor = 1; 

        // 🔮 設定 Google 高辨識度文青手寫字型組合
        const fontName = "'Zhi Mang Xing', 'Ma Shan Zheng', 'Noto Serif TC', cursive, sans-serif";

        function initWordCloud() {
            resizeCanvas();
            generateLayout();
            drawLoop();
            
            setInterval(triggerSpotlight, 3800);
            setTimeout(triggerSpotlight, 1500); 
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            dpr = window.devicePixelRatio || 1;
            scaleFactor = rect.width < 500 ? 0.65 : 1.0;

            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
        }

        // 🔮 智慧自動斷行文字寬度度量器
        function measureWishText(text, size) {
            ctx.save();
            ctx.font = `bold ${size}px ${fontName}`;
            let lines = [];
            
            // 如果超過 8 個字，自動平分成兩行
            if (text.length > 8) {
                const mid = Math.ceil(text.length / 2);
                lines.push(text.substring(0, mid));
                lines.push(text.substring(mid));
            } else {
                lines.push(text);
            }

            // 計算多行中最寬的一行，以及總高度
            let maxWidth = 0;
            lines.forEach(line => {
                const w = ctx.measureText(line).width;
                if (w > maxWidth) maxWidth = w;
            });
            ctx.restore();

            const h = lines.length > 1 ? (size * 1.8) : size;
            return { lines, width: maxWidth + 12, height: h + 8 };
        }

        function generateLayout() {
            words = [];
            const W = canvas.width / dpr;
            const H = canvas.height / dpr;

            bigWords.forEach((text, idx) => {
                const baseSize = 42 - (idx * 1.35); 
                const size = baseSize * scaleFactor; 
                addWordRandomScatter(text, size, true, idx, W * 0.18, W * 0.82, H * 0.18, H * 0.82, 35 * scaleFactor);
            });

            const maxSmallWords = 60;
            let attempts = 0;
            
            while (words.length < (bigWords.length + maxSmallWords) && attempts < 4000) {
                attempts++;
                const text = smallWordsPool[attempts % smallWordsPool.length];
                const baseSize = 13 + (attempts % 10) + (Math.random() * 0.5);
                const size = baseSize * scaleFactor; 
                
                if (addWordRandomScatter(text, size, false, attempts, W * 0.06, W * 0.94, H * 0.06, H * 0.94, 10 * scaleFactor)) {
                }
            }
        }

        function addWordRandomScatter(text, size, isHighlight, colorSeed, minX, maxX, minY, maxY, safetyBuffer) {
            const dims = measureWishText(text, size);
            const w = dims.width;
            const h = dims.height;

            const W = canvas.width / dpr;
            const H = canvas.height / dpr;
            
            let localAttempts = 0;
            while (localAttempts < 500) {
                localAttempts++;
                const x = Math.random() * (maxX - minX) + minX;
                const y = Math.random() * (maxY - minY) + minY;

                if (x - w/2 < 12 || x + w/2 > W - 12 || y - h/2 < 12 || y + h/2 > H - 12) {
                    continue;
                }

                let isOverlapping = false;
                for (let i = 0; i < words.length; i++) {
                    const other = words[i];
                    if (Math.abs(x - other.x) < (w + other.w)/2 + safetyBuffer && Math.abs(y - other.y) < (h + other.h)/2 + safetyBuffer) {
                        isOverlapping = true;
                        break;
                    }
                }

                if (!isOverlapping) {
                    // 長字體(換行字)維持平角以利閱讀，短字體維持微幅旋轉
                    const maxAngle = (isHighlight || dims.lines.length > 1) ? (6 * Math.PI / 180) : (26 * Math.PI / 180);
                    const rotateAngle = (Math.random() * 2 - 1) * maxAngle;

                    const colorIndex = (colorSeed * 7 + localAttempts) % colorPalette.length;
                    const color = colorPalette[colorIndex];
                    
                    words.push({
                        text: text, lines: dims.lines, baseSize: size, currentSize: size,
                        x: x, y: y, w: w, h: h,
                        color: color, isHighlight: isHighlight,
                        angle: rotateAngle
                    });
                    return true;
                }
            }
            return false;
        }

        function drawLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(dpr, dpr); 

            // 第一層：繪製普通文字（支援多行智慧繪製）
            words.forEach((word, idx) => {
                if (idx === activeIndex) return; 
                ctx.save();
                ctx.translate(word.x, word.y);
                ctx.rotate(word.angle);

                word.currentSize += (word.baseSize - word.currentSize) * 0.1;
                ctx.fillStyle = word.color;
                ctx.font = `bold ${word.currentSize}px ${fontName}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                if (word.lines.length > 1) {
                    word.lines.forEach((line, lIdx) => {
                        const offset = (lIdx - (word.lines.length - 1) / 2) * (word.currentSize * 1.15);
                        ctx.fillText(line, 0, offset);
                    });
                } else {
                    ctx.fillText(word.text, 0, 0);
                }
                ctx.restore();
            });

            // 第二層：絕對置頂、防爆框聚光燈（灰底反白）
            if (activeIndex !== -1) {
                const word = words[activeIndex];
                ctx.save();
                
                // 🔒 限制聚光燈放大程度，降至穩定的 1.15 倍，絕不撐破邊界
                const targetSize = word.baseSize * 1.15; 
                word.currentSize += (targetSize - word.currentSize) * 0.1;
                
                const boxW = word.w * 1.25;
                const boxH = word.h * 1.25;
                
                let renderX = word.x;
                let renderY = word.y;
                
                const W = canvas.width / dpr;
                const H = canvas.height / dpr;

                // 🔒 嚴格的視窗邊框物理反彈反鎖定機制
                if (renderX - boxW/2 < 20) renderX = boxW/2 + 20;
                if (renderX + boxW/2 > W - 20) renderX = W - boxW/2 - 20;
                if (renderY - boxH/2 < 20) renderY = boxH/2 + 20;
                if (renderY + boxH/2 > H - 20) renderY = H - boxH/2 - 20;

                ctx.translate(renderX, renderY);
                ctx.rotate(word.angle);

                // 灰底框
                ctx.beginPath();
                ctx.fillStyle = `rgba(100, 100, 100, ${0.75 * highlightProgress})`; 
                ctx.roundRect(-boxW/2, -boxH/2, boxW, boxH, 8);
                ctx.fill();

                // 聚光燈純白字
                ctx.fillStyle = `rgba(255, 255, 255, ${highlightProgress})`;
                ctx.font = `bold ${word.currentSize}px ${fontName}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                if (word.lines.length > 1) {
                    word.lines.forEach((line, lIdx) => {
                        const offset = (lIdx - (word.lines.length - 1) / 2) * (word.currentSize * 1.15);
                        ctx.fillText(line, 0, offset);
                    });
                } else {
                    ctx.fillText(word.text, 0, 0);
                }
                ctx.restore();
            }

            ctx.restore();
            requestAnimationFrame(drawLoop);
        }

        function triggerSpotlight() {
            const highlightPool = words.reduce((acc, w, i) => w.isHighlight ? [...acc, i] : acc, []);
            if (highlightPool.length === 0) return;

            let nextIdx;
            do {
                nextIdx = highlightPool[Math.floor(Math.random() * highlightPool.length)];
            } while (nextIdx === activeIndex && highlightPool.length > 1);

            activeIndex = nextIdx;
            highlightProgress = 0;
            
            let fadeIn = setInterval(() => {
                highlightProgress += 0.06;
                if (highlightProgress >= 1) {
                    highlightProgress = 1;
                    clearInterval(fadeIn);
                }
            }, 25);

            setTimeout(() => {
                let fadeOut = setInterval(() => {
                    highlightProgress -= 0.06;
                    if (highlightProgress <= 0) {
                        highlightProgress = 0;
                        activeIndex = -1; 
                        clearInterval(fadeOut);
                    }
                }, 25);
            }, 2300);
        }

        // 確保 Google 雲端手寫字型完全下載完才繪製，保證自動斷行的寬度測量 100% 精準
        document.fonts.ready.then(() => {
            initWordCloud();
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            generateLayout();
        });
    </script>
</body>
</html>
